<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EpicTrader - Trading Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: rgb(2, 15, 36);
            color: white;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Circular Progress Bar */
        .progress-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: conic-gradient(#10b981 0% 0%,
                    rgba(255, 255, 255, 0.1) 0% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background 0.5s ease-out, box-shadow 0.3s ease-in-out;
        }

        .progress-circle::before {
            content: "";
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: rgb(2, 15, 36);
            /* Matches body bg to create ring effect */
            position: absolute;
        }

        /* Mobile adjustment for progress circle */
        @media (max-width: 768px) {
            .progress-circle {
                width: 90px;
                height: 90px;
            }

            .progress-circle::before {
                width: 76px;
                height: 76px;
            }
        }

        /* Glassmorphism toggle for dropdown */
        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        /* Hide scrollbar for tick history */
        .noscroll::-webkit-scrollbar {
            display: none;
        }

        .noscroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Modal specific animations */
        #settingsModal.active,
        #tokenModal.active {
            opacity: 1;
            visibility: visible;
        }

        #settingsModal.active>div,
        #tokenModal.active>div,
        #centralAlert.active>div {
            transform: scale(1);
        }

        /* Glass Backdrop Blur */
        .backdrop-blur-bg {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .alert-glass {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col relative overflow-hidden text-sm md:text-base">

    <!-- Ambient Background blobs for aesthetic -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-600/20 rounded-full blur-[100px] pointer-events-none">
    </div>
    <div
        class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-600/20 rounded-full blur-[100px] pointer-events-none">
    </div>

    <!-- Navigation -->
    <nav
        class="w-full p-4 md:p-6 flex justify-between items-center z-[100] sticky top-0 bg-rgb(2, 15, 36)/50 backdrop-blur-md">
        <!-- Brand Name -->
        <div class="text-xl md:text-2xl font-bold tracking-tighter text-white">
            EpicTrader
        </div>

        <!-- Account Dropdown -->
        <div class="relative ml-auto md:ml-0">
            <button id="accountDropdownBtn"
                class="glass-input text-white px-4 py-2 rounded-full flex items-center gap-2 hover:bg-white/10 transition-all cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-xs md:text-sm">
                <span id="currentAccountType" class="font-medium">Real Account</span>
                <svg xmlns="http://www.w3.org/2000/svg"
                    class="h-3 w-3 md:h-4 md:w-4 text-gray-400 transition-transform duration-200" id="dropdownArrow"
                    fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>

            <!-- Dropdown Menu -->
            <div id="accountDropdownMenu"
                class="absolute right-0 mt-2 w-40 md:w-48 glass-card rounded-xl shadow-2xl transform origin-top-right scale-95 opacity-0 invisible transition-all duration-200 overflow-hidden z-50">
                <div class="p-1">
                    <button
                        class="account-option w-full text-left px-4 py-2 md:py-3 rounded-lg hover:bg-white/10 text-xs md:text-sm transition-colors flex items-center gap-2"
                        data-type="Real Account">
                        <div class="w-2 h-2 rounded-full bg-green-500"></div>
                        Real Account
                    </button>
                    <button
                        class="account-option w-full text-left px-4 py-2 md:py-3 rounded-lg hover:bg-white/10 text-xs md:text-sm transition-colors flex items-center gap-2"
                        data-type="Demo Account">
                        <div class="w-2 h-2 rounded-full bg-yellow-500"></div>
                        Demo Account
                    </button>
                    <div class="h-px bg-white/10 my-1 mx-1"></div>
                    <button id="addTokenBtn"
                        class="w-full text-left px-4 py-2 md:py-3 rounded-lg hover:bg-white/10 text-xs md:text-sm transition-colors flex items-center gap-2 text-blue-400 font-medium">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        Add Token
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main
        class="flex-grow flex flex-col items-center justify-start p-3 md:p-6 z-10 w-full max-w-xl mx-auto space-y-4 md:space-y-8 pt-4 md:pt-6">

        <!-- Centered Brand (Small/Subtitle or removed as requested) -->
        <div class="text-center mb-2 md:mb-0 opacity-0 pointer-events-none">
            <!-- Hidden to prioritize nav brand -->
        </div>

        <!-- Dashboard Card -->
        <div
            class="glass-card rounded-2xl md:rounded-3xl p-5 md:p-8 w-full relative overflow-hidden shadow-2xl space-y-4 md:space-y-6">
            <!-- Card content container: Forced Side-by-Side on Mobile -->
            <div class="flex flex-row items-center justify-between gap-3 md:gap-8">

                <!-- Stats Column -->
                <div class="flex-1 space-y-3 md:space-y-4">
                    <!-- Balance -->
                    <div>
                        <p class="text-gray-400 text-[10px] md:text-xs uppercase tracking-wider font-medium">Total
                            Balance</p>
                        <div class="text-xl md:text-4xl font-bold text-white flex items-baseline gap-1">
                            <span class="text-base md:text-2xl opacity-60">$</span>
                            <span id="balanceDisplay">0.00</span>
                        </div>
                    </div>

                    <!-- Profit -->
                    <div>
                        <p class="text-gray-400 text-[10px] md:text-xs uppercase tracking-wider font-medium">Session
                            Profit</p>
                        <div class="text-base md:text-2xl font-semibold text-green-400 flex items-center gap-1">
                            <span id="sessionProfitDisplay">+$0.00</span>
                        </div>
                    </div>
                </div>

                <!-- Vertical Separator -->
                <div class="w-px h-20 md:h-24 bg-white/10"></div>

                <!-- Progress Circle Column -->
                <div class="flex flex-col items-center justify-center">
                    <div id="progressCircle" class="progress-circle shadow-[0_0_30px_rgba(16,185,129,0.2)]">
                        <div class="relative z-10 flex flex-col items-center justify-center text-center">
                            <span id="progressPercentage" class="text-lg md:text-2xl font-bold text-white">0%</span>
                            <span class="text-[9px] md:text-[10px] text-gray-400 uppercase tracking-wide">Profits</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Settings Button (Outline) -->
            <button id="settingsBtn"
                class="w-full border border-white/20 text-white/80 hover:text-white hover:bg-white/5 font-medium rounded-lg md:rounded-xl py-2 md:py-3 transition-colors text-xs md:text-sm flex items-center justify-center gap-2 group">
                <svg xmlns="http://www.w3.org/2000/svg"
                    class="h-4 w-4 opacity-70 group-hover:opacity-100 transition-opacity" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                Settings
            </button>
        </div>

        <!-- Start Bot Button -->
        <div class="w-full flex justify-center py-2 md:py-4">
            <button id="botControlBtn"
                class="bg-blue-600 hover:bg-blue-500 text-white text-base md:text-lg font-bold py-3 px-12 md:px-16 rounded-full shadow-[0_0_30px_rgba(37,99,235,0.4)] hover:shadow-[0_0_50px_rgba(37,99,235,0.6)] hover:scale-105 active:scale-95 transition-all duration-300 w-full md:w-auto">
                Start Bot
            </button>
        </div>

        <!-- Current Tick -->
        <div class="w-full glass-card p-4 md:p-6 rounded-xl md:rounded-2xl flex flex-col items-center">
            <p class="text-gray-400 text-[10px] md:text-xs uppercase tracking-wider mb-1 font-medium">Current Tick</p>
            <div id="tickDisplay"
                class="text-3xl md:text-5xl font-mono font-bold text-white tracking-widest drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]">
                0.000
            </div>
        </div>



        <!-- Transactions -->
        <div class="w-full space-y-2 pb-12">
            <p class="text-gray-400 text-[10px] md:text-xs uppercase tracking-wider px-1 font-medium">Recent
                Transactions</p>
            <div class="glass-card rounded-lg md:rounded-xl overflow-hidden">
                <table class="w-full text-left text-[10px] md:text-xs">
                    <thead class="bg-white/5 text-gray-400 uppercase tracking-tight">
                        <tr>
                            <th class="p-2 md:p-3 font-medium">Time</th>
                            <th class="p-2 md:p-3 font-medium">Contract</th>
                            <th class="p-2 md:p-3 font-medium">Exit Tick</th>
                            <th class="p-2 md:p-3 font-medium">Stake</th>
                            <th class="p-2 md:p-3 font-medium text-right">Profit</th>
                        </tr>
                    </thead>
                    <tbody id="transactionBody" class="divide-y divide-white/5">
                        <!-- Real trades will be added here -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- Settings Modal -->
    <div id="settingsModal"
        class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm opacity-0 invisible transition-all duration-300">
        <div
            class="glass-card w-full max-w-md rounded-3xl p-6 md:p-8 transform scale-95 transition-all duration-300 max-h-[90vh] flex flex-col">
            <h2 class="text-2xl font-bold tracking-tight mb-6">Bot Settings</h2>

            <form id="settingsForm" class="space-y-4 overflow-y-auto pr-2 noscroll">
                <div class="space-y-2">
                    <label class="text-xs font-medium text-gray-400 uppercase tracking-widest">Market</label>
                    <select name="market" id="marketSelect"
                        class="w-full glass-input rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                        <option value="RANDOM">RANDOM MARKET</option>
                        <optgroup label="Volatility Indices">
                            <option value="R_10">Volatility 10 Index</option>
                            <option value="1HZ10V">Volatility 10 (1s) Index</option>
                            <option value="R_25">Volatility 25 Index</option>
                            <option value="1HZ25V">Volatility 25 (1s) Index</option>
                            <option value="R_50">Volatility 50 Index</option>
                            <option value="1HZ50V">Volatility 50 (1s) Index</option>
                            <option value="R_75">Volatility 75 Index</option>
                            <option value="1HZ75V">Volatility 75 (1s) Index</option>
                            <option value="R_100">Volatility 100 Index</option>
                            <option value="1HZ100V">Volatility 100 (1s) Index</option>
                        </optgroup>
                        <optgroup label="Jump Indices">
                            <option value="JD10">Jump 10 Index</option>
                            <option value="JD25">Jump 25 Index</option>
                            <option value="JD50">Jump 50 Index</option>
                            <option value="JD75">Jump 75 Index</option>
                            <option value="JD100">Jump 100 Index</option>
                        </optgroup>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-medium text-gray-400 uppercase tracking-widest">Contract Type</label>
                    <select name="contractType"
                        class="w-full glass-input rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                        <option value="DIGITEVEN">Digit Even</option>
                        <option value="DIGITODD">Digit Odd</option>
                        <option value="DIGITMATCH">Digit Matches</option>
                        <option value="DIGITDIFF">Digit Differs</option>
                        <option value="RANDOM_DIFF">Random Differ</option>
                        <option value="DIGITOVER">Digit Over</option>
                        <option value="DIGITUNDER">Digit Under</option>
                        <option value="CALL">Rise (Call)</option>
                        <option value="PUT">Fall (Put)</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-medium text-gray-400 uppercase tracking-widest">Stake ($)</label>
                        <input type="number" name="stake" value="0.35" step="0.01" min="0.35"
                            class="w-full glass-input rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-medium text-gray-400 uppercase tracking-widest">Duration
                            (Ticks)</label>
                        <input type="number" name="duration" value="5" min="1" max="10"
                            class="w-full glass-input rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                    </div>
                </div>

                <!-- Recovery Strategy Section -->
                <div class="space-y-4 pt-2 border-t border-white/5">
                    <div class="space-y-2">
                        <label class="text-xs font-medium text-gray-400 uppercase tracking-widest">Recovery
                            Strategy</label>
                        <select name="recoveryStrategy" id="recoverySelect"
                            class="w-full glass-input rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                            <option value="none">None</option>
                            <option value="martingale">Martingale</option>
                            <option value="compounding">Compounding</option>
                        </select>
                    </div>

                    <!-- Martingale Fields -->
                    <div id="martingaleFields" class="hidden space-y-4 animate-fade-in">
                        <div class="grid grid-cols-3 gap-3">
                            <div class="space-y-2">
                                <label
                                    class="text-[9px] font-medium text-gray-400 uppercase tracking-widest">Factor</label>
                                <input type="number" name="martingaleFactor" value="2" step="0.01"
                                    class="w-full glass-input rounded-lg px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[9px] font-medium text-gray-400 uppercase tracking-widest">Do
                                    After</label>
                                <input type="number" name="martingaleAfter" value="1" min="1"
                                    class="w-full glass-input rounded-lg px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[9px] font-medium text-gray-400 uppercase tracking-widest">Max
                                    Lev</label>
                                <input type="number" name="maxMartingale" value="3" min="1"
                                    class="w-full glass-input rounded-lg px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                            </div>
                        </div>
                    </div>

                    <!-- Compounding Fields -->
                    <div id="compoundingFields" class="hidden space-y-4 animate-fade-in">
                        <div class="space-y-2">
                            <label class="text-[9px] font-medium text-gray-400 uppercase tracking-widest">Compounding
                                Levels</label>
                            <input type="number" name="compoundingLevels" value="3" min="1"
                                class="w-full glass-input rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-[9px] font-medium text-gray-400 uppercase tracking-widest">Comp.
                                    Martingale Factor</label>
                                <input type="number" name="compoundingMartingaleFactor" value="2.00" step="0.01"
                                    min="1.00"
                                    class="w-full glass-input rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[9px] font-medium text-gray-400 uppercase tracking-widest">Max Comp.
                                    Levels</label>
                                <input type="number" name="maxCompoundingMartingale" value="3" min="1"
                                    class="w-full glass-input rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                            </div>
                        </div>
                    </div>

                    <!-- Recovery Contract Selection -->
                    <div class="space-y-4 pt-2 border-t border-white/5">
                        <div class="flex items-center gap-3 px-1">
                            <input type="checkbox" id="recoveryContractCheck" name="recoveryContractActive"
                                class="w-4 h-4 rounded bg-white/10 border-white/20 text-blue-600 focus:ring-blue-500/50">
                            <label for="recoveryContractCheck"
                                class="text-xs font-medium text-gray-400 uppercase tracking-widest">Recovery
                                Contract</label>
                        </div>

                        <div id="recoveryContractFields" class="hidden space-y-4 animate-fade-in px-1">
                            <div class="space-y-2">
                                <label class="text-[9px] font-medium text-gray-400 uppercase tracking-widest">Recovery
                                    Contract Type</label>
                                <select name="recoveryContractType" id="recoveryContractType"
                                    class="w-full glass-input rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                                    <option value="DIGITOVER">Digit Over</option>
                                    <option value="DIGITUNDER">Digit Under</option>
                                    <option value="DIGITEVEN">Digit Even</option>
                                    <option value="DIGITODD">Digit Odd</option>
                                    <option value="CALL">Rise (Call)</option>
                                    <option value="PUT">Fall (Put)</option>
                                </select>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div id="recoveryBarrierField" class="space-y-2">
                                    <label
                                        class="text-[9px] font-medium text-gray-400 uppercase tracking-widest">Recovery
                                        Barrier</label>
                                    <input type="number" name="recoveryBarrier" value="5" min="0" max="9"
                                        class="w-full glass-input rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                                </div>
                                <div class="space-y-2 flex flex-col justify-center">
                                    <label
                                        class="text-[9px] font-medium text-gray-400 uppercase tracking-widest mb-1">Continuous
                                        Mode</label>
                                    <div class="flex items-center gap-2">
                                        <input type="checkbox" id="recoveryContinuousCheck"
                                            name="recoveryContinuousMode"
                                            class="w-4 h-4 rounded bg-white/10 border-white/20 text-blue-600 focus:ring-blue-500/50">
                                        <span class="text-[10px] text-gray-400">Keep until win</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- VPS Mode Section -->
                    <div class="space-y-4 pt-2 border-t border-white/5">
                        <div class="flex items-center gap-3 px-1">
                            <input type="checkbox" id="vpsModeCheck" name="vpsModeActive"
                                class="w-4 h-4 rounded bg-white/10 border-white/20 text-blue-600 focus:ring-blue-500/50">
                            <label for="vpsModeCheck"
                                class="text-xs font-medium text-gray-400 uppercase tracking-widest">VPS Mode
                                (Breaks)</label>
                        </div>

                        <div id="vpsFields" class="hidden space-y-4 animate-fade-in px-1">
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-2">
                                    <label class="text-[9px] font-medium text-gray-400 uppercase tracking-widest">VPS
                                        Profit ($)</label>
                                    <input type="number" name="vpsProfit" value="1.00" step="0.01" min="0.10"
                                        class="w-full glass-input rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[9px] font-medium text-gray-400 uppercase tracking-widest">Break
                                        (Seconds)</label>
                                    <input type="number" name="vpsBreak" value="60" min="5"
                                        class="w-full glass-input rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-3">
                    <div class="space-y-2">
                        <label class="text-xs font-medium text-gray-400 uppercase tracking-widest text-[9px]">Digit
                            Barrier</label>
                        <input type="number" name="barrier" value="5" min="0" max="9"
                            class="w-full glass-input rounded-lg px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-medium text-gray-400 uppercase tracking-widest text-[9px]">Take
                            Profit</label>
                        <input type="number" name="takeProfit" value="50" step="0.1"
                            class="w-full glass-input rounded-lg px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-medium text-gray-400 uppercase tracking-widest text-[9px]">Stop
                            Loss</label>
                        <input type="number" name="stopLoss" value="30" step="0.1"
                            class="w-full glass-input rounded-lg px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                    </div>
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="button" id="closeSettings"
                        class="flex-1 border border-white/20 text-white/60 hover:text-white hover:bg-white/5 font-medium rounded-xl py-3 transition-colors text-sm">
                        Cancel
                    </button>
                    <button type="submit"
                        class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl py-3 transition-colors text-sm shadow-xl shadow-blue-900/40">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Token Modal -->
    <div id="tokenModal"
        class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm opacity-0 invisible transition-all duration-300">
        <div
            class="glass-card w-full max-w-md rounded-3xl p-6 md:p-8 space-y-6 transform scale-95 transition-all duration-300">
            <h2 class="text-2xl font-bold tracking-tight">API Tokens</h2>

            <form id="tokenForm" class="space-y-4">
                <div class="space-y-2">
                    <label class="text-xs font-medium text-gray-400 uppercase tracking-widest">Real Account
                        Token</label>
                    <input type="password" name="realToken" placeholder="Enter Real Token"
                        class="w-full glass-input rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-medium text-gray-400 uppercase tracking-widest">Demo Account
                        Token</label>
                    <input type="password" name="demoToken" placeholder="Enter Demo Token"
                        class="w-full glass-input rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="button" id="closeTokenModal"
                        class="flex-1 border border-white/20 text-white/60 hover:text-white hover:bg-white/5 font-medium rounded-xl py-3 transition-colors text-sm">
                        Cancel
                    </button>
                    <button type="submit"
                        class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl py-3 transition-colors text-sm shadow-xl shadow-blue-900/40">
                        Save Tokens
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toastContainer" class="fixed top-6 right-6 z-[200] space-y-3 pointer-events-none"></div>

    <script src="app.js"></script>
    <!-- Central Alert Modal -->
    <div id="centralAlert"
        class="fixed inset-0 z-[100] flex items-center justify-center p-4 opacity-0 invisible transition-all duration-300 backdrop-blur-bg bg-black/40">
        <div
            class="alert-glass rounded-3xl p-8 max-w-sm w-full text-center transform scale-90 transition-transform duration-300 space-y-6 relative overflow-hidden">
            <!-- Decorative circle behind icon -->
            <div id="alertIconBg"
                class="absolute top-0 left-1/2 -translate-x-1/2 w-40 h-40 bg-blue-500/10 rounded-full blur-3xl -z-10">
            </div>

            <div class="flex justify-center">
                <div id="alertIconContainer" class="w-20 h-20 rounded-2xl flex items-center justify-center mb-2">
                    <!-- Icon will be inserted here -->
                </div>
            </div>

            <div class="space-y-2">
                <h2 id="alertTitle" class="text-2xl md:text-3xl font-bold text-white tracking-tight">Success!</h2>
                <p id="alertMessage" class="text-gray-400 text-sm md:text-base leading-relaxed">
                    Message goes here...
                </p>
            </div>

            <button onclick="hideCentralAlert()"
                class="w-full bg-white/10 hover:bg-white/20 text-white font-semibold py-3 rounded-xl transition-all border border-white/10 hover:border-white/20">
                Acknowledge
            </button>
        </div>
    </div>

    <script src="socket.js"></script>
</body>

</html>
